<!--
費用比較インタラクティブツール
「従来測量 vs ドローン測量」コスト比較計算機
純HTML/CSS/JSで実装（WordPressページに埋め込み可能）
-->

<style>
.cost-calc {
  --brand: #1647FB;
  --brand-dark: #0d2f99;
  --bg: #f8f9fa;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #666;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 16px;
}
.cost-calc h2 {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text);
  margin: 0 0 8px;
}
.cost-calc .subtitle {
  color: var(--muted);
  font-size: .95rem;
  margin: 0 0 32px;
}
.cost-calc .input-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  margin: 0 0 32px;
}
.cost-calc .input-group {
  background: var(--card);
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.cost-calc .input-group label {
  display: block;
  font-size: .9rem;
  font-weight: 600;
  color: var(--text);
  margin: 0 0 8px;
}
.cost-calc .input-group select,
.cost-calc .input-group input[type="number"] {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid #d0d5dd;
  border-radius: 8px;
  font-size: 1rem;
  color: var(--text);
  background: #fff;
  -webkit-appearance: none;
  box-sizing: border-box;
}
.cost-calc .input-group select:focus,
.cost-calc .input-group input:focus {
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(22,71,251,.12);
}
.cost-calc .input-group .hint {
  font-size: .8rem;
  color: var(--muted);
  margin: 6px 0 0;
}
.cost-calc .range-display {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 8px 0 0;
}
.cost-calc .range-display input[type="range"] {
  flex: 1;
  accent-color: var(--brand);
}
.cost-calc .range-display .range-value {
  font-weight: 700;
  color: var(--brand);
  min-width: 80px;
  text-align: right;
}

/* Results */
.cost-calc .results {
  display: none;
  margin: 0 0 32px;
}
.cost-calc .results.visible {
  display: block;
}
.cost-calc .result-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 0 0 24px;
}
@media (max-width: 600px) {
  .cost-calc .result-cards {
    grid-template-columns: 1fr;
  }
}
.cost-calc .result-card {
  border-radius: 12px;
  padding: 24px;
  text-align: center;
}
.cost-calc .result-card.traditional {
  background: #fef3f2;
  border: 2px solid #fecdca;
}
.cost-calc .result-card.drone {
  background: #f0f4ff;
  border: 2px solid #b4c6fc;
}
.cost-calc .result-card h3 {
  font-size: 1rem;
  margin: 0 0 4px;
}
.cost-calc .result-card .price {
  font-size: 2rem;
  font-weight: 800;
  margin: 8px 0;
}
.cost-calc .result-card.traditional .price { color: #b42318; }
.cost-calc .result-card.drone .price { color: var(--brand); }
.cost-calc .result-card .detail {
  font-size: .85rem;
  color: var(--muted);
  line-height: 1.5;
}

/* Savings */
.cost-calc .savings-banner {
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
  color: #fff;
  border-radius: 12px;
  padding: 28px;
  text-align: center;
  margin: 0 0 24px;
}
.cost-calc .savings-banner .savings-amount {
  font-size: 2.5rem;
  font-weight: 800;
  margin: 0 0 4px;
}
.cost-calc .savings-banner .savings-label {
  font-size: 1rem;
  opacity: .9;
}
.cost-calc .savings-details {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin: 0 0 32px;
}
@media (max-width: 600px) {
  .cost-calc .savings-details {
    grid-template-columns: 1fr;
  }
}
.cost-calc .savings-detail {
  background: var(--card);
  border-radius: 8px;
  padding: 16px;
  text-align: center;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.cost-calc .savings-detail .value {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--brand);
}
.cost-calc .savings-detail .label {
  font-size: .85rem;
  color: var(--muted);
  margin: 4px 0 0;
}

/* CTA */
.cost-calc .result-cta {
  text-align: center;
  padding: 20px 0;
}
.cost-calc .result-cta a {
  display: inline-block;
  padding: 16px 36px;
  background: var(--brand);
  color: #fff;
  text-decoration: none;
  border-radius: 8px;
  font-weight: 700;
  font-size: 1rem;
  transition: background .2s;
}
.cost-calc .result-cta a:hover {
  background: var(--brand-dark);
}

/* Disclaimer */
.cost-calc .disclaimer {
  font-size: .8rem;
  color: #999;
  text-align: center;
  margin: 16px 0 0;
  line-height: 1.5;
}

/* Calculate button */
.cost-calc .calc-btn {
  display: block;
  width: 100%;
  max-width: 400px;
  margin: 0 auto 32px;
  padding: 16px;
  background: var(--brand);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: background .2s;
}
.cost-calc .calc-btn:hover {
  background: var(--brand-dark);
}
</style>

<div class="cost-calc">
  <h2>従来測量 vs ドローン測量 コスト比較</h2>
  <p class="subtitle">現場の条件を入力すると、概算費用の比較が表示されます。</p>

  <div class="input-grid">
    <div class="input-group">
      <label for="cc-area">測量面積</label>
      <div class="range-display">
        <input type="range" id="cc-area" min="100" max="100000" value="5000" step="100">
        <span class="range-value" id="cc-area-val">5,000 m&sup2;</span>
      </div>
      <p class="hint">100 m&sup2;（小規模宅地）〜 100,000 m&sup2;（大規模造成）</p>
    </div>

    <div class="input-group">
      <label for="cc-terrain">地形タイプ</label>
      <select id="cc-terrain">
        <option value="flat">平坦地（宅地・農地・駐車場等）</option>
        <option value="moderate" selected>緩斜面（造成地・丘陵地）</option>
        <option value="steep">急傾斜（法面・山間部・崖地）</option>
        <option value="complex">複雑地形（砕石場・河川敷）</option>
      </select>
    </div>

    <div class="input-group">
      <label for="cc-precision">精度要件</label>
      <select id="cc-precision">
        <option value="standard">標準精度（±10cm — 概算土量・進捗管理）</option>
        <option value="high" selected>高精度（±5cm — 設計・施工管理）</option>
        <option value="ultra">超高精度（±3cm — 確定測量・出来形管理）</option>
      </select>
    </div>

    <div class="input-group">
      <label for="cc-deliverable">納品物</label>
      <select id="cc-deliverable">
        <option value="basic">点群データのみ</option>
        <option value="standard" selected>点群 + オルソ画像</option>
        <option value="full">点群 + オルソ + 3Dモデル + CAD</option>
        <option value="premium">上記 + 土量計算 + 断面図</option>
      </select>
    </div>
  </div>

  <button class="calc-btn" onclick="calculateCost()">費用を比較する</button>

  <div class="results" id="cc-results">
    <div class="result-cards">
      <div class="result-card traditional">
        <h3>従来の測量</h3>
        <div class="price" id="cc-trad-price">-</div>
        <div class="detail" id="cc-trad-detail"></div>
      </div>
      <div class="result-card drone">
        <h3>ドローン測量</h3>
        <div class="price" id="cc-drone-price">-</div>
        <div class="detail" id="cc-drone-detail"></div>
      </div>
    </div>

    <div class="savings-banner">
      <div class="savings-amount" id="cc-savings">-</div>
      <div class="savings-label">のコスト削減が見込めます</div>
    </div>

    <div class="savings-details">
      <div class="savings-detail">
        <div class="value" id="cc-save-pct">-</div>
        <div class="label">コスト削減率</div>
      </div>
      <div class="savings-detail">
        <div class="value" id="cc-save-days">-</div>
        <div class="label">工期短縮</div>
      </div>
      <div class="savings-detail">
        <div class="value" id="cc-save-crew">-</div>
        <div class="label">必要人員の削減</div>
      </div>
    </div>

    <div class="result-cta">
      <a href="/contact/">この条件で正式見積りを依頼する</a>
    </div>

    <p class="disclaimer">
      ※上記は概算シミュレーションです。実際の費用は現場状況により異なります。<br>
      正確なお見積りは、お問い合わせフォームまたはお電話（050-7117-7141）にてご依頼ください。
    </p>
  </div>
</div>

<script>
(function() {
  // Range slider display
  var areaSlider = document.getElementById('cc-area');
  var areaVal = document.getElementById('cc-area-val');
  areaSlider.addEventListener('input', function() {
    areaVal.textContent = Number(this.value).toLocaleString() + ' m\u00B2';
  });

  // Cost calculation logic
  window.calculateCost = function() {
    var area = parseInt(areaSlider.value);
    var terrain = document.getElementById('cc-terrain').value;
    var precision = document.getElementById('cc-precision').value;
    var deliverable = document.getElementById('cc-deliverable').value;

    // --- 従来測量の概算ロジック ---
    // 基本単価: 平坦地 200円/m2, 面積増で逓減
    var tradBaseRate;
    if (area <= 1000) tradBaseRate = 250;
    else if (area <= 5000) tradBaseRate = 180;
    else if (area <= 20000) tradBaseRate = 120;
    else if (area <= 50000) tradBaseRate = 80;
    else tradBaseRate = 60;

    var terrainMultiplier = {flat: 1.0, moderate: 1.3, steep: 1.8, complex: 2.0};
    var precisionMultiplier = {standard: 0.8, high: 1.0, ultra: 1.3};

    var tradCost = area * tradBaseRate * terrainMultiplier[terrain] * precisionMultiplier[precision];

    // 最低金額
    tradCost = Math.max(tradCost, 150000);

    // 工期（従来）
    var tradDays;
    if (area <= 1000) tradDays = 2;
    else if (area <= 5000) tradDays = 4;
    else if (area <= 20000) tradDays = 8;
    else if (area <= 50000) tradDays = 15;
    else tradDays = 25;
    tradDays = Math.ceil(tradDays * terrainMultiplier[terrain]);

    // 人員（従来）
    var tradCrew;
    if (area <= 1000) tradCrew = 2;
    else if (area <= 5000) tradCrew = 3;
    else if (area <= 20000) tradCrew = 4;
    else tradCrew = 5;

    // --- ドローン測量の概算ロジック ---
    var droneBaseRate;
    if (area <= 1000) droneBaseRate = 100;
    else if (area <= 5000) droneBaseRate = 60;
    else if (area <= 20000) droneBaseRate = 35;
    else if (area <= 50000) droneBaseRate = 22;
    else droneBaseRate = 15;

    var droneTerrainMult = {flat: 1.0, moderate: 1.1, steep: 1.2, complex: 1.3};
    var dronePrecisionMult = {standard: 0.8, high: 1.0, ultra: 1.4};
    var droneDeliverableMult = {basic: 0.7, standard: 1.0, full: 1.3, premium: 1.6};

    var droneCost = area * droneBaseRate * droneTerrainMult[terrain]
                    * dronePrecisionMult[precision] * droneDeliverableMult[deliverable];

    // 最低金額（ドローン: 撮影費+解析費最低ライン）
    droneCost = Math.max(droneCost, 50000);

    // 工期（ドローン）
    var droneDays;
    if (area <= 5000) droneDays = 1;
    else if (area <= 20000) droneDays = 2;
    else if (area <= 50000) droneDays = 3;
    else droneDays = 5;

    var deliverableDayAdd = {basic: 0, standard: 1, full: 2, premium: 3};
    droneDays += deliverableDayAdd[deliverable];

    // 人員（ドローン）
    var droneCrew = area <= 20000 ? 1 : 2;

    // --- 結果表示 ---
    var savings = tradCost - droneCost;
    var savePct = Math.round((savings / tradCost) * 100);
    var daysSaved = tradDays - droneDays;
    var crewSaved = tradCrew - droneCrew;

    function formatYen(n) {
      return '\u00A5' + Math.round(n / 10000).toLocaleString() + '\u4E07';
    }
    function formatYenDetail(n) {
      return '\u00A5' + Math.round(n).toLocaleString();
    }

    document.getElementById('cc-trad-price').textContent = formatYen(tradCost);
    document.getElementById('cc-trad-detail').innerHTML =
      '\u5DE5\u671F: \u7D04' + tradDays + '\u65E5\u9593 / \u5FC5\u8981\u4EBA\u54E1: ' + tradCrew + '\u540D<br>' +
      '\u8A73\u7D30: ' + formatYenDetail(tradCost);

    document.getElementById('cc-drone-price').textContent = formatYen(droneCost);
    document.getElementById('cc-drone-detail').innerHTML =
      '\u5DE5\u671F: \u7D04' + droneDays + '\u65E5\u9593 / \u5FC5\u8981\u4EBA\u54E1: ' + droneCrew + '\u540D<br>' +
      '\u8A73\u7D30: ' + formatYenDetail(droneCost);

    document.getElementById('cc-savings').textContent = formatYen(savings) + '\u524A\u6E1B';
    document.getElementById('cc-save-pct').textContent = savePct + '%';
    document.getElementById('cc-save-days').textContent = daysSaved + '\u65E5\u77ED\u7E2E';
    document.getElementById('cc-save-crew').textContent = crewSaved + '\u540D\u524A\u6E1B';

    document.getElementById('cc-results').classList.add('visible');
  };
})();
</script>
