name: Case Page Auto-Updater (Weekly Sun 8AM JST)

on:
  schedule:
    - cron: '0 23 * * 6'  # 23:00 UTC Sat = 08:00 JST Sun
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup config
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          CRM_BASE_TOKEN: ${{ secrets.CRM_BASE_TOKEN }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: python scripts/setup_config.py

      - name: Update case page
        run: python scripts/auto_case_updater.py --notify
