name: Bid Scanner (Weekday 8AM JST)

on:
  schedule:
    - cron: '0 23 * * 0-4'  # 23:00 UTC Sun-Thu = 08:00 JST Mon-Fri
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup config
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
        run: python scripts/setup_config.py

      - name: Scan bids
        run: python scripts/bid_scanner.py --days 5
