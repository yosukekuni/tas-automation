name: CRM Monitor (15min)

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:  # Manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup config
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          CRM_BASE_TOKEN: ${{ secrets.CRM_BASE_TOKEN }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
        run: python scripts/setup_config.py

      - name: Restore state
        uses: actions/cache/restore@v5
        with:
          path: scripts/crm_monitor_state.json
          key: crm-monitor-state-${{ github.run_id }}
          restore-keys: |
            crm-monitor-state-

      - name: Run CRM Monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/lark_crm_monitor.py

      - name: Save state
        uses: actions/cache/save@v5
        if: always()
        with:
          path: scripts/crm_monitor_state.json
          key: crm-monitor-state-${{ github.run_id }}
