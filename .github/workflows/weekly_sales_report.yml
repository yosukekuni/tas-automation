name: Weekly Sales Report (per-rep schedule)

on:
  schedule:
    - cron: '0 12 * * 1'  # 12:00 UTC Monday = 21:00 JST Monday → 新美（火曜前夜）
    - cron: '0 12 * * 4'  # 12:00 UTC Thursday = 21:00 JST Thursday → 政木（金曜前夜）
  workflow_dispatch:
    inputs:
      rep:
        description: '対象担当（空欄で全員）'
        required: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup config
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          CRM_BASE_TOKEN: ${{ secrets.CRM_BASE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
        run: python scripts/setup_config.py

      - name: Send report (Monday night = 新美)
        if: github.event.schedule == '0 12 * * 1'
        run: python scripts/weekly_sales_report.py --send --rep 新美

      - name: Send report (Thursday night = 政木)
        if: github.event.schedule == '0 12 * * 4'
        run: python scripts/weekly_sales_report.py --send --rep 政木

      - name: Send report (manual)
        if: github.event_name == 'workflow_dispatch'
        run: python scripts/weekly_sales_report.py --send ${{ inputs.rep && format('--rep {0}', inputs.rep) || '' }}

      - name: Upload reports
        uses: actions/upload-artifact@v7
        with:
          name: weekly-reports-${{ github.run_number }}
          path: scripts/weekly_reports/
          retention-days: 30
        if: always()
