name: Seasonal Survey Planning Email

on:
  schedule:
    # 4月第1週 月曜 9:00 JST (= 0:00 UTC)
    - cron: '0 0 1-7 4 1'
    # 10月第1週 月曜 9:00 JST (= 0:00 UTC)
    - cron: '0 0 1-7 10 1'
  workflow_dispatch:
    inputs:
      season:
        description: 'Season: april or october'
        required: false
        default: ''
      mode:
        description: 'Mode: dry-run, send, list'
        required: false
        default: 'dry-run'

jobs:
  seasonal:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup config
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          CRM_BASE_TOKEN: ${{ secrets.CRM_BASE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
        run: python scripts/setup_config.py

      - name: Run seasonal email
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          CRM_BASE_TOKEN: ${{ secrets.CRM_BASE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          SEASON="${{ github.event.inputs.season }}"
          MODE="${{ github.event.inputs.mode }}"
          ARGS=""
          if [ -n "$SEASON" ]; then ARGS="$ARGS --season $SEASON"; fi
          # スケジュール実行時は --send（手動時はinputに従う）
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="$ARGS --send"
          elif [ "$MODE" = "send" ]; then
            ARGS="$ARGS --send"
          elif [ "$MODE" = "list" ]; then
            ARGS="$ARGS --list"
          else
            ARGS="$ARGS --dry-run"
          fi
          python scripts/seasonal_email.py $ARGS

      - name: Upload drafts
        uses: actions/upload-artifact@v7
        with:
          name: seasonal-drafts-${{ github.run_number }}
          path: scripts/seasonal_drafts/
          retention-days: 30
        if: always()
