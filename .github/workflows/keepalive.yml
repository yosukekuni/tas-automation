name: Keep Alive (Monthly)

on:
  schedule:
    - cron: '0 0 1 * *'  # 1st of every month
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Keep repository active
        run: echo "Keepalive $(date -u)" >> keepalive.log
