name: Follow-up Email Generation (Weekday 9AM JST)

on:
  schedule:
    - cron: '0 0 * * 1-5'  # 00:00 UTC = 09:00 JST, Mon-Fri
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup config
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          CRM_BASE_TOKEN: ${{ secrets.CRM_BASE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
        run: python scripts/setup_config.py

      - name: Restore cooldown state
        uses: actions/cache/restore@v5
        with:
          path: scripts/followup_cooldown.json
          key: followup-cooldown-v1-${{ github.run_id }}
          restore-keys: |
            followup-cooldown-v1-
            followup-cooldown-

      - name: Generate follow-up emails
        run: python scripts/auto_followup_email.py

      - name: Save cooldown state
        uses: actions/cache/save@v5
        if: always()
        with:
          path: scripts/followup_cooldown.json
          key: followup-cooldown-v1-${{ github.run_id }}

      - name: Upload drafts
        uses: actions/upload-artifact@v7
        with:
          name: followup-drafts-${{ github.run_number }}
          path: scripts/followup_drafts/
          retention-days: 30
        if: always()
