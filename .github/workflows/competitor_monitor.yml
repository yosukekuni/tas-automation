name: Competitor Monitor

on:
  schedule:
    - cron: '0 23 1 * *'  # 毎月1日 8:00 JST
  workflow_dispatch:

env:
  LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
  LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
  LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Write config
        run: |
          cat > scripts/automation_config.json << 'CONF'
          {
            "lark": {
              "app_id": "${{ secrets.LARK_APP_ID }}",
              "app_secret": "${{ secrets.LARK_APP_SECRET }}",
              "crm_base_token": "${{ secrets.CRM_BASE_TOKEN }}"
            },
            "notifications": {
              "lark_webhook_url": "${{ secrets.LARK_WEBHOOK_URL }}"
            }
          }
          CONF

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: scripts/data/competitor_monitor_state.json
          key: competitor-state-${{ github.run_id }}
          restore-keys: competitor-state-

      - name: Run competitor monitor
        run: |
          cd scripts
          mkdir -p data
          python3 competitor_monitor.py --check

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: competitor-report-${{ github.run_id }}
          path: scripts/data/competitor_monitor_state.json
          retention-days: 365
