name: Email Nurturing Sequences

on:
  schedule:
    - cron: '0 0 * * 1-5'  # 00:00 UTC weekdays = 09:00 JST weekdays
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: scan, send, scan+send, list, dry-run'
        required: false
        default: ''

jobs:
  nurture:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup config
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          CRM_BASE_TOKEN: ${{ secrets.CRM_BASE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
        run: python scripts/setup_config.py

      - name: Restore state
        uses: actions/cache/restore@v5
        with:
          path: |
            scripts/nurturing_state.json
            scripts/nurturing_queue.json
          key: nurturing-state-v3-${{ github.run_id }}
          restore-keys: |
            nurturing-state-v3-
            nurturing-state-

      - name: Run nurturing
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -n "$MODE" ]; then
            python scripts/email_nurturing_sequences.py --$MODE
          else
            python scripts/email_nurturing_sequences.py --scan --send
          fi

      - name: Save state
        uses: actions/cache/save@v5
        if: always()
        with:
          path: |
            scripts/nurturing_state.json
            scripts/nurturing_queue.json
          key: nurturing-state-v3-${{ github.run_id }}
