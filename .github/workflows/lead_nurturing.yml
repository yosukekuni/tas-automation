name: Lead Nurturing (Weekly Wednesday 9AM JST)

on:
  schedule:
    - cron: '0 0 * * 3'  # 00:00 UTC Wednesday = 09:00 JST Wednesday
  workflow_dispatch:

jobs:
  nurture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup config
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          CRM_BASE_TOKEN: ${{ secrets.CRM_BASE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/setup_config.py

      - name: Run Lead Nurturing
        run: python scripts/lead_nurturing.py --generate --limit 10

      - name: Upload drafts
        uses: actions/upload-artifact@v7
        with:
          name: nurture-drafts-${{ github.run_number }}
          path: scripts/nurture_drafts/
          retention-days: 30
        if: always()
